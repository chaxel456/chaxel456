<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">

  <!-- Floating -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 -6;0 0"
      dur="3s"
      repeatCount="indefinite"/>

    <!-- Shadow -->
    <ellipse cx="140" cy="245" rx="55" ry="10" fill="#000" opacity="0.15"/>

    <!-- Body -->
    <ellipse cx="140" cy="165" rx="55" ry="70" fill="#f8b34d"/>

    <!-- Head -->
    <circle cx="140" cy="90" r="55" fill="#f8b34d"/>

    <!-- Left Ear -->
    <polygon points="95,55 110,15 130,55" fill="#f8b34d"/>

    <!-- Right Ear -->
    <polygon points="150,55 170,15 185,55" fill="#f8b34d"/>

    <!-- Eyes -->
    <g>

      <!-- Left -->
      <ellipse cx="120" cy="90" rx="5" ry="8" fill="#111">
        <animate
          attributeName="ry"
          values="8;0.5;8"
          dur="4s"
          repeatCount="indefinite"/>
      </ellipse>

      <!-- Right -->
      <ellipse cx="160" cy="90" rx="5" ry="8" fill="#111">
        <animate
          attributeName="ry"
          values="8;0.5;8"
          dur="4s"
          repeatCount="indefinite"/>
      </ellipse>

    </g>

    <!-- Nose -->
    <circle cx="140" cy="108" r="3" fill="#111"/>

    <!-- Mouth -->
    <path d="M140 112 Q140 122 132 126"
          stroke="#111"
          stroke-width="2"
          fill="none"/>

    <path d="M140 112 Q140 122 148 126"
          stroke="#111"
          stroke-width="2"
          fill="none"/>

    <!-- Whiskers -->
    <line x1="105" y1="108" x2="82" y2="102" stroke="#111" stroke-width="2"/>
    <line x1="105" y1="115" x2="82" y2="115" stroke="#111" stroke-width="2"/>

    <line x1="175" y1="108" x2="198" y2="102" stroke="#111" stroke-width="2"/>
    <line x1="175" y1="115" x2="198" y2="115" stroke="#111" stroke-width="2"/>

    <!-- Feet -->
    <ellipse cx="120" cy="228" rx="10" ry="7" fill="#e09b38"/>
    <ellipse cx="160" cy="228" rx="10" ry="7" fill="#e09b38"/>

    <!-- Tail -->
    <path d="M88 185
             C40 170 45 235 85 220"
          fill="none"
          stroke="#f8b34d"
          stroke-width="18"
          stroke-linecap="round">

      <animate
        attributeName="d"
        dur="2.5s"
        repeatCount="indefinite"
        values="
M88 185 C40 170 45 235 85 220;
M88 185 C35 160 55 240 95 215;
M88 185 C40 170 45 235 85 220"/>
    </path>

  </g>

</svg>
